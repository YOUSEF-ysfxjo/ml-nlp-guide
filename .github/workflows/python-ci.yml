name: Python CI

on:
  push:
    branches: ["main", "master"]
    paths:
      - "**.py"
      - "**/requirements*.txt"
      - ".github/workflows/python-ci.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "**.py"
      - "**/requirements*.txt"
      - ".github/workflows/python-ci.yml"
  workflow_dispatch:

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install project requirements if they exist
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f daily-brief/requirements.txt ]; then pip install -r daily-brief/requirements.txt; fi
          # Install test/lint extras
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; ignore long lines (E501)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,venv,__pycache__,.git
          flake8 . --count --exit-zero --max-line-length=120 --statistics --exclude=.venv,venv,__pycache__,.git

      - name: Run tests with pytest
        run: |
          # Only run pytest when test files are present; skip silently otherwise.
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            pytest --tb=short
          else
            echo "No test files found — skipping pytest."
          fi

      # NOTE: Jupyter notebooks are intentionally NOT executed in CI.
      # Run notebooks locally: jupyter nbconvert --to notebook --execute <notebook>.ipynb
